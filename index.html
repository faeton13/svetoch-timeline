/* ---------- data prep ---------- */
const EVENTS = TIMELINE.events;
const N = EVENTS.length;
const TYPE_COLOR = {location:0x4aa22c, event:0x1fb3a5, encounter:0xc0563a, travel:0x5a7fd6};
const TYPE_NAME  = {location:'Поселение / отдых', event:'Событие', encounter:'Стычка', travel:'Путь'};
const TYPE_CSS   = {location:'#4aa22c', event:'#1fb3a5', encounter:'#c0563a', travel:'#5a7fd6'};
const MONTH_ORDER = ['Абадиус','Калистрил','Фараст','Гозран','Дезнус','Саренит','Эрастус','Ародус','Рова','Ламашан','Нетх','Кутона'];
function monthOf(d){
  if(!d) return null;
  for(const m of MONTH_ORDER){ if(d.includes(m.slice(0,6))) return m; }
  return null;
}
function yearOf(d){ const m=d&&d.match(/47\d\d/); return m?m[0]:''; }

// related sessions: keyword match between event title and session texts
const STOP = new Set(['нападение','возвращение','возврат','миссия','поход','атака','путь','дорога','бой','битва','засада','встреча','ночь','день','первый','новый','большой','великий','старый']);
function keywords(s){
  return (s.toLowerCase().match(/[а-яёa-z]{5,}/g)||[]).map(w=>w.replace(/(ами|ями|ов|ев|ой|ей|ах|ях|ам|ям|ую|ая|ое|ые|ий|ый|ть|ла|ло|ли|а|я|о|е|у|ю|ы|и|ь)$/,'')).filter(w=>w.length>=4 && !STOP.has(w));
}
function relatedSessions(ev){
  const kws = keywords(ev.title + ' ' + (ev.location||''));
  if(!kws.length) return [];
  const out=[];
  for(const s of ENRICH.sessions){
    const hay=(s.chapter_title+' '+s.summary+' '+s.key_events.join(' ')+' '+(s.locations||[]).join(' ')).toLowerCase();
    let hits=0; for(const k of kws){ if(hay.includes(k)) hits++; }
    if(hits>0) out.push({s,hits});
  }
  out.sort((a,b)=>b.hits-a.hits);
  return out.slice(0,3).map(o=>o.s);
}

const canvas=document.getElementById('scene');

renderer.setPixelRatio(Math.min(devicePixelRatio,innerWidth<800?1.5:2));
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0b0e1a);
scene.fog=new THREE.FogExp2(0x0b0e1a,0.016);
const camera=new THREE.PerspectiveCamera(55,1,0.1,600);

scene.add(new THREE.AmbientLight(0x445577,0.9));
const moon=new THREE.DirectionalLight(0xaabbff,0.7); moon.position.set(-40,80,-30); scene.add(moon);
const warm=new THREE.PointLight(0xd4af6a,0.8,60); scene.add(warm);

/* path: winding road through the events */
const SPACING=11;
const pathPts=[];
for(let i=0;i<N;i++){
  const t=i/(N-1);
  const x=Math.sin(i*0.35)*16 + Math.sin(i*0.11)*24;
  const y=Math.sin(i*0.18)*2.2 + 2.5;
  const z=-i*SPACING;
  pathPts.push(new THREE.Vector3(x,y,z));
}
const curve=new THREE.CatmullRomCurve3(pathPts,false,'catmullrom',0.4);

/* road ribbon */
{
  const tube=new THREE.Mesh(
    new THREE.TubeGeometry(curve,N*6,0.45,10,false),
    new THREE.MeshStandardMaterial({color:0xd4af6a,emissive:0x9a7a3a,emissiveIntensity:0.55,roughness:0.5})
  );
  scene.add(tube);
  const glow=new THREE.Mesh(
    new THREE.TubeGeometry(curve,N*6,1.1,10,false),
    new THREE.MeshBasicMaterial({color:0xd4af6a,transparent:true,opacity:0.07})
  );
  scene.add(glow);
}

/* ground */
{
  const g=new THREE.PlaneGeometry(900,N*SPACING+300,60,180);
  const pos=g.attributes.position;
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i), y=pos.getY(i);
    pos.setZ(i, Math.sin(x*0.05)*Math.cos(y*0.03)*3 + Math.sin(x*0.11+y*0.07)*1.5);
  }
  g.computeVertexNormals();
  const ground=new THREE.Mesh(g,new THREE.MeshStandardMaterial({color:0x101830,roughness:1}));
  ground.rotation.x=-Math.PI/2; ground.position.set(0,-1.5,-N*SPACING/2);
  scene.add(ground);
}

/* stars */
{
  const sg=new THREE.BufferGeometry(); const v=[];
  for(let i=0;i<1600;i++){
    const r=280+Math.random()*120, a=Math.random()*Math.PI*2, h=Math.random()*220-20;
    v.push(Math.cos(a)*r, h, -N*SPACING/2+Math.sin(a)*r*2);
  }
  sg.setAttribute('position',new THREE.Float32BufferAttribute(v,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xcdd6ff,size:0.9,sizeAttenuation:true,transparent:true,opacity:0.8})));
}

/* text sprite helper */
function textSprite(text,{size=44,color='#e8e4d8',bg=null,pad=14,mult=1}={}){
  const c=document.createElement('canvas'), ctx=c.getContext('2d');
  ctx.font=`${size}px Georgia`;
  const w=ctx.measureText(text).width;
  c.width=w+pad*2; c.height=size+pad*2;
  ctx.font=`${size}px Georgia`;
  if(bg){ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(0,0,c.width,c.height,14);ctx.fill();}
  ctx.fillStyle=color; ctx.textBaseline='middle';
  ctx.fillText(text,pad,c.height/2);
  const tex=new THREE.CanvasTexture(c); tex.minFilter=THREE.LinearFilter;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false}));
  const s=(MOBILE?0.020:0.028)*mult;
  sp.scale.set(c.width*s,c.height*s,1);
  return sp;
}

/* event markers */
const markers=[]; // {mesh,label,ev,idx,pos}
const pickables=[];
const gates=[];
const geoByType={
  location:new THREE.ConeGeometry(0.9,2.2,6),
  event:new THREE.SphereGeometry(0.75,16,12),
  encounter:new THREE.OctahedronGeometry(0.95),
  travel:new THREE.SphereGeometry(0.55,12,10)
};
let lastMonth=null;
for(let i=0;i<N;i++){
  const ev=EVENTS[i];
  const t=i/(N-1);
  const p=curve.getPointAt(t);
  const tangent=curve.getTangentAt(t);
  const side=new THREE.Vector3().crossVectors(tangent,new THREE.Vector3(0,1,0)).normalize();
  const off=(i%2===0?1:-1)*(2.6+(i%3)*0.5);
  const isNow=ev.color==='#ff0066';
  const color=isNow?0xff0066:(TYPE_COLOR[ev.type]||0x1fb3a5);
  const m=new THREE.Mesh(
    ev.type==='location'?geoByType.location:geoByType[ev.type]||geoByType.event,
    new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:0.45,roughness:0.4})
  );
  m.position.copy(p).addScaledVector(side,off);
  m.position.y=p.y+1.6;
  if(ev.type==='location') m.position.y+=0.5;
  scene.add(m);
  // stem
  const stem=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,m.position.y+1.5),
    new THREE.MeshBasicMaterial({color:0x38405f}));
  stem.position.set(m.position.x,(m.position.y-1.5)/2,m.position.z);
  scene.add(stem);
  // label
  const short=ev.title.length>26?ev.title.slice(0,25)+'…':ev.title;
  const lab=textSprite(short,{size:38,color:isNow?'#ff7eb2':'#e8e4d8',bg:'rgba(11,14,26,0.72)'});
  lab.position.copy(m.position); lab.position.y+=2.1;
  scene.add(lab);
  m.userData={idx:i};
  markers.push({mesh:m,label:lab,ev,idx:i,pos:m.position.clone()});
  pickables.push(m);
  // month gates
  const mo=monthOf(ev.date);
  if(mo && mo!==lastMonth){
    lastMonth=mo;
    const gate=textSprite(`— ${mo} ${yearOf(ev.date)} —`,{size:52,color:'#d4af6a',mult:MOBILE?0.55:1});
    gate.position.set(p.x,p.y+7.5,p.z);
    scene.add(gate); gates.push(gate);
  }
  if(isNow){
    const halo=new THREE.Mesh(new THREE.RingGeometry(1.4,1.8,32),
      new THREE.MeshBasicMaterial({color:0xff0066,transparent:true,opacity:0.6,side:THREE.DoubleSide}));
    halo.position.copy(m.position); halo.rotation.x=-Math.PI/2;
    scene.add(halo);
    m.userData.halo=halo;
  }
}

/* ---------- camera travel ---------- */
let progress=0, targetProgress=0;      // 0..1 along curve
let yaw=0, pitch=0, tYaw=0, tPitch=0;  // look around
let dragging=false, px=0, py=0;

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
addEventListener('wheel',e=>{
  if(overlayOpen()) return;
  targetProgress=clamp(targetProgress + e.deltaY*0.00012,0,1);
},{passive:true});
addEventListener('keydown',e=>{
  if(overlayOpen()) return;
  if(e.key==='ArrowUp'||e.key==='w') targetProgress=clamp(targetProgress+0.008,0,1);
  if(e.key==='ArrowDown'||e.key==='s') targetProgress=clamp(targetProgress-0.008,0,1);
  if(e.key==='ArrowRight') stepEvent(1);
  if(e.key==='ArrowLeft') stepEvent(-1);
  if(e.key==='Escape'){closeCard();closeOverlay();}
});
let touchMode=false;
canvas.addEventListener('pointerdown',e=>{dragging=true;touchMode=(e.pointerType==='touch');px=e.clientX;py=e.clientY;moved=0;});
let moved=0;
addEventListener('pointermove',e=>{
  if(e.pointerType!=='touch') hover(e);
  if(!dragging) return;
  const dx=e.clientX-px, dy=e.clientY-py; px=e.clientX; py=e.clientY;
  moved+=Math.abs(dx)+Math.abs(dy);
  if(touchMode){
    tYaw=clamp(tYaw-dx*0.004,-1.2,1.2);
    targetProgress=clamp(targetProgress+dy*0.0009,0,1);
  } else {
    tYaw=clamp(tYaw-dx*0.003,-1.2,1.2);
    tPitch=clamp(tPitch-dy*0.002,-0.5,0.6);
  }
});
addEventListener('pointerup',()=>{dragging=false;});

/* touch управление объединено в pointermove (touchMode) */

/* raycasting */
const ray=new THREE.Raycaster(); ray.params.Points={threshold:2};
const mouse=new THREE.Vector2();
const tip=document.getElementById('tip');
function setMouse(e){ mouse.x=(e.clientX/innerWidth)*2-1; mouse.y=-(e.clientY/innerHeight)*2+1; }
function pick(e){
  setMouse(e); ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(pickables,false);
  return hits.length?hits[0].object:null;
}
function hover(e){
  if(dragging){tip.style.display='none';return;}
  const o=pick(e);
  if(o){
    const ev=EVENTS[o.userData.idx];
    tip.querySelector('.d').textContent=ev.date||'';
    tip.querySelector('.t').textContent=ev.title;
    tip.style.display='block';
    tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY+10)+'px';
    canvas.style.cursor='pointer';
  } else { tip.style.display='none'; canvas.style.cursor='grab'; }
}
canvas.addEventListener('click',e=>{
  if(moved>6) return;
  const o=pick(e);
  if(o) openEvent(o.userData.idx,true);
});

/* ---------- detail card ---------- */
const card=document.getElementById('card');
let currentIdx=null;
function openEvent(idx,fly){
  currentIdx=idx;
  const ev=EVENTS[idx];
  document.getElementById('cDate').textContent=ev.date||'дата неизвестна';
  document.getElementById('cTitle').textContent=ev.title;
  document.getElementById('cLoc').textContent=ev.location?('📍 '+ev.location):'';
  const b=document.getElementById('cBadge');
  const isNow=ev.color==='#ff0066';
  b.textContent=isNow?'Текущая позиция':(TYPE_NAME[ev.type]||ev.type);
  const cc=isNow?'#ff0066':(TYPE_CSS[ev.type]||'#1fb3a5');
  b.style.color=cc; b.style.borderColor=cc;
  const body=document.getElementById('cBody');
  let html='';
  const rel=relatedSessions(ev);
  if(rel.length){
    html+='<h3>Возможно, из этих глав</h3>';
    for(const s of rel){
      html+=`<div class="sess" onclick="openSessions(${Number(s.n)||0})"><span class="sn">Сессия ${Number(s.n)||0} · ${esc(s.date)}</span><br><b>${esc(s.chapter_title)}</b></div>`;
    }
  } else {
    html+='<p class="sum">Прямых совпадений с главами не нашлось — событие сохранилось на карте странствий Линзи.</p>';
  }
  body.innerHTML=html;
  card.classList.add('show');
  if(fly) targetProgress=idx/(N-1);
}
function closeCard(){card.classList.remove('show');currentIdx=null;}
function stepEvent(d){
  let i=currentIdx===null?Math.round(targetProgress*(N-1)):currentIdx;
  i=clamp(i+d,0,N-1);
  openEvent(i,true);
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

/* ---------- scrubber ---------- */
const scrub=document.getElementById('scrub');
const fill=scrub.querySelector('.fill'), knob=scrub.querySelector('.knob');
{
  const mBox=scrub.querySelector('.months');

      el.className='mt'; el.style.left=pct+'%';
      el.innerHTML=`${showLabel?mo.slice(0,3):''}<i></i>`;
      mBox.appendChild(el);
    }
  }
}
function scrubTo(e){
  const r=scrub.getBoundingClientRect();
  targetProgress=clamp((e.clientX-r.left)/r.width,0,1);
}
scrub.addEventListener('pointerdown',e=>{scrubTo(e);
  const mv=ev=>scrubTo(ev), up=()=>{removeEventListener('pointermove',mv);removeEventListener('pointerup',up);};
  addEventListener('pointermove',mv); addEventListener('pointerup',up);
});

/* ---------- overlays ---------- */
const overlay=document.getElementById('overlay');
const ovContent=document.getElementById('ovContent');
function overlayOpen(){return overlay.classList.contains('show')}
function closeOverlay(){overlay.classList.remove('show');setTab('road');}
function setTab(t){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===t));}
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{
  const t=b.dataset.t; setTab(t);
  if(t==='road') closeOverlay();
  else if(t==='sessions') openSessions();
  else openNpcs();
}));

function sessionCard(s){
  const npcs=(s.npcs_met||[]).slice(0,10).map(n=>`<span class="chip npc">${esc(n)}</span>`).join('');
  const locs=(s.locations||[]).slice(0,6).map(l=>`<span class="chip loc">${esc(l)}</span>`).join('');
  const evs=(s.key_events||[]).map(e=>`<li>${esc(e)}</li>`).join('');
  return `<div class="scard" id="sess-${Number(s.n)||0}">
    <div class="top"><span class="sn">СЕССИЯ ${Number(s.n)||0}</span><h3>${esc(s.chapter_title)}</h3>${s.rec?'<span class="chip" style="border-color:rgba(212,175,106,.45);color:var(--gold)">реконструкция</span>':''}<span class="rd">${esc(s.date)}</span></div>
    <p>${esc(s.summary)}</p>
    ${evs?`<details><summary>Ключевые события</summary><ul>${evs}</ul></details>`:''}
    <div class="tags">${npcs}${locs}</div>
  </div>`;
}
function openSessions(focusN){
  setTab('sessions');
  let html=`<h2>Сессии кампании</h2>
  <div class="osub">хроники Линзи, сессии ${ENRICH.sessions[0].n}–${ENRICH.sessions[ENRICH.sessions.length-1].n} · ${ENRICH.sessions.length} записей</div>
  <input id="search" placeholder="Поиск: имя, место, событие…" oninput="filterSessions(this.value)">
  <div id="sessList">`;
  for(const s of ENRICH.sessions) html+=sessionCard(s);
  html+='</div>';
  ovContent.innerHTML=html;
  overlay.classList.add('show');
  if(focusN){
    const el=document.getElementById('sess-'+focusN);
    if(el){el.scrollIntoView();el.style.borderColor='var(--gold)';}
  } else overlay.scrollTop=0;
}
function filterSessions(q){
  q=q.toLowerCase().trim();
  for(const s of ENRICH.sessions){
    const el=document.getElementById('sess-'+s.n);
    if(!el) continue;
    const hay=(s.chapter_title+' '+s.summary+' '+(s.npcs_met||[]).join(' ')+' '+(s.key_events||[]).join(' ')+' '+(s.locations||[]).join(' ')).toLowerCase();
    el.style.display=(!q||hay.includes(q))?'':'none';
  }
}
function openNpcs(){
  setTab('npcs');
  const names=Object.keys(ENRICH.npc_index).sort((a,b)=>ENRICH.npc_index[a].first_session-ENRICH.npc_index[b].first_session);
  let html=`<h2>Кого мы встретили</h2>
  <div class="osub">важнейшие лица кампании — по порядку знакомства · ${names.length} записей</div>`;
  for(const n of names){
    const x=ENRICH.npc_index[n];
    html+=`<div class="ncard"><b>${esc(n)}</b><span class="fs">с сессии ${Number(x.first_session)||"?"}</span><span>${esc(x.role||'')}</span></div>`;
  }
  ovContent.innerHTML=html;
  overlay.classList.add('show');
  overlay.scrollTop=0;
}

/* ---------- render loop ---------- */
function resize(){
  renderer.setSize(innerWidth,innerHeight,false);
  camera.aspect=innerWidth/innerHeight;
  camera.fov=camera.aspect<0.9?72:55;
  camera.updateProjectionMatrix();
}
addEventListener('resize',resize); resize();

const up=new THREE.Vector3(0,1,0);
let clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta(), el=clock.elapsedTime;
  progress+=(targetProgress-progress)*Math.min(1,dt*4);
  yaw+=(tYaw-yaw)*Math.min(1,dt*6);
  pitch+=(tPitch-pitch)*Math.min(1,dt*6);

  const t=clamp(progress,0,0.999);
  const p=curve.getPointAt(t);
  const ahead=curve.getPointAt(Math.min(t+0.008,1));
  const dir=ahead.clone().sub(p).normalize();
  const portrait=camera.aspect<0.9;
  const camPos=p.clone().addScaledVector(dir,portrait?-14:-9).add(new THREE.Vector3(0,portrait?7:5.5,0));
  camera.position.lerp(camPos,Math.min(1,dt*5));
  const look=p.clone().addScaledVector(dir,portrait?18:14);
  look.y+=2;
  // apply look-around
  const q=new THREE.Quaternion().setFromAxisAngle(up,yaw);
  const offset=look.clone().sub(camera.position).applyQuaternion(q);
  offset.y+=pitch*18;
  camera.lookAt(camera.position.clone().add(offset));

  warm.position.copy(p).add(new THREE.Vector3(0,6,0));

  // marker animation + label distance fade
  for(const m of markers){
    const d=camera.position.distanceTo(m.pos);
    m.label.material.opacity=clamp(1.6-d/(MOBILE?34:45),0,1);
    m.label.visible=d<(MOBILE?58:80);
    m.mesh.rotation.y=el*0.6;
    if(m.mesh.userData.halo){ m.mesh.userData.halo.scale.setScalar(1+Math.sin(el*3)*0.15); }
  }
  for(const g of gates){
    const d=camera.position.distanceTo(g.position);
    g.material.opacity=clamp((d-7)/9,0,1)*clamp(1.8-d/70,0,1);
    g.visible=g.material.opacity>0.03;
  }
  fill.style.width=(progress*100)+'%';
  knob.style.left=(progress*100)+'%';
  renderer.render(scene,camera);
}
animate();
setTimeout(()=>{const l=document.getElementById('loading');l.style.opacity=0;setTimeout(()=>l.remove(),900);},700);

/* roundRect polyfill for older canvas */
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.beginPath();this.moveTo(x+r,y);this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);this.closePath();return this;};
}
</script>
